<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fake Stream Ad - Fixed</title>
    <style>
        /* 1. 全要素の余白をリセットし、サイズ計算を「枠線込み」に固定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. body自体の余白を消し、広告がはみ出さないようにする */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent; /* 背景に馴染ませる */
        }

        /* 3. 広告コンテナの設定 */
        #ad-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #000;
            font-family: sans-serif;
            cursor: pointer;
            /* 枠線が必要な場合は border を含めても box-sizing で 300px に維持されます */
            border: 1px solid #333; 
        }

        /* --- 以下、デザインパーツ（変更なし） --- */
        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #001f3f 0%, #0074D9 100%);
            z-index: 1;
        }

        .copy-container {
            position: absolute;
            top: 20px;
            left: 15px;
            z-index: 2;
            color: #fff;
        }

        .main-copy {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.3;
        }

        .sub-copy {
            font-size: 11px;
            margin-bottom: 5px;
            background: #FF4136;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            color: #fff;
        }

        .benefit {
            position: absolute;
            bottom: 70px;
            left: 15px;
            z-index: 2;
            color: #fff;
        }

        .price span {
            font-size: 28px;
            font-weight: bold;
            color: #FFDC00;
        }

        .cta-button {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px; /* 左右から固定して幅を安定させる */
            height: 45px;
            background-color: #fff;
            color: #0074D9;
            text-align: center;
            line-height: 45px;
            font-weight: bold;
            border-radius: 25px;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div id="ad-container">
        <div class="bg-gradient"></div>
        <div class="copy-container">
            <p class="sub-copy">140チャンネル以上が見放題</p>
            <h1 class="main-copy">極上のエンタメを、<br>その手に。</h1>
        </div>
        <div class="benefit">
            <p class="price">加入月は <span>0</span> 円</p>
        </div>
        <div class="cta-button">今すぐ2週間お試し</div>
    </div>

</body>
</html>
