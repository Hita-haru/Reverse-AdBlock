<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Ad 300x250</title>
    <style>
        /* 広告枠の基本設定 */
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        .ad-container {
            width: 300px;
            height: 250px;
            background: linear-gradient(135deg, #1a0b2e 0%, #4a148c 100%);
            position: relative;
            cursor: pointer;
            border: 1px solid #333;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* 装飾的な背景光 */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, rgba(255,215,0,0) 70%);
            animation: pulse 2s infinite ease-in-out;
        }

        /* タイトルアニメーション */
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            margin-bottom: 5px;
            z-index: 2;
        }

        .subtitle {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 15px;
            z-index: 2;
        }

        /* キャラクター代わりの輝くカード */
        .card-visual {
            width: 80px;
            height: 110px;
            background: linear-gradient(45deg, #ffd700, #fff);
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
            animation: float 3s infinite ease-in-out;
        }

        .card-visual::after {
            content: "SSR";
            color: #d42d2d;
            font-weight: 900;
            font-size: 20px;
        }

        /* ボタン */
        .cta-button {
            background: #ff5722;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #bf360c;
            transition: transform 0.1s;
            z-index: 2;
        }

        /* アニメーション定義 */
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* ホバー演出 */
        .ad-container:hover .cta-button {
            background: #ff7043;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="ad-container" onclick="location.href='https://google.com'">
        <div class="glow"></div>
        
        <div class="subtitle">今なら100連無料！</div>
        <div class="title">クリスタル・サーガ</div>
        
        <div class="card-visual"></div>
        
        <div class="cta-button">今すぐ無料でプレイ</div>
        
        <div style="font-size: 8px; margin-top: 10px; opacity: 0.6; z-index: 2;">
            &copy; 2026 Crystal Saga Studio Inc.
        </div>
    </div>

</body>
</html>
