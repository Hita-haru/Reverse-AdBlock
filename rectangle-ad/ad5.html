<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Blue Button Ad</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
        
        .ad-container {
            width: 300px;
            height: 250px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* テキストエリア */
        .text-content {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-copy {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            color: #333333;
            margin: 0 0 8px 0;
        }

        .sub-copy {
            font-size: 14px;
            color: #666666;
            margin: 0;
        }

        /* 青いボタン */
        .blue-button {
            width: 200px;
            height: 40px;
            background-color: #1a73e8; /* Google等の標準的な信頼感のある青 */
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.1s;
        }

        /* ホバー・アクティブ時の演出 */
        .ad-container:hover {
            background-color: #fafafa;
        }

        .ad-container:hover .blue-button {
            background-color: #1765cc;
        }

        .ad-container:active .blue-button {
            transform: scale(0.98);
        }

        /* 広告識別マーク（必要に応じて） */
        .ad-label {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 10px;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="ad-container" id="ad-container">
        <div class="ad-label">AD</div>
        
        <div class="text-content">
            <h1 class="main-copy">続きを見るにはこちら</h1>
            <p class="sub-copy">続きを見るにはこちらをクリック</p>
        </div>

        <div class="blue-button">
            続きを見る
        </div>
    </div>
    <script src="popup.js"></script>

</body>
</html>
