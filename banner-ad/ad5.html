<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Value Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #f8f9fa;
        }

        .ad-container {
            width: 728px;
            height: 90px;
            background: linear-gradient(120deg, #fff 70%, #fff7ed 70%);
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #e5e7eb;
            box-sizing: border-box;
            cursor: pointer;
            overflow: hidden;
        }

        /* 左側のアイコン・ロゴエリア */
        .logo-area {
            width: 140px;
            padding-left: 20px;
            z-index: 2;
        }

        .brand-name {
            color: #ea580c; /* 不動産らしいオレンジ */
            font-size: 22px;
            font-weight: 900;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .brand-name span {
            font-size: 12px;
            background: #ea580c;
            color: #fff;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 5px;
        }

        .brand-sub {
            font-size: 9px;
            color: #6b7280;
            margin-top: 2px;
        }

        /* メインコピーエリア */
        .main-content {
            flex-grow: 1;
            padding-left: 20px;
            z-index: 2;
        }

        .catch-phrase {
            font-size: 18px;
            font-weight: bold;
            color: #1f2937;
            margin: 0;
        }

        .catch-phrase strong {
            color: #e11d48; /* 強調の赤 */
            font-size: 22px;
        }

        .description {
            font-size: 12px;
            color: #4b5563;
            margin-top: 4px;
            display: flex;
            align-items: center;
        }

        .check-mark {
            color: #10b981;
            margin-right: 4px;
            font-weight: bold;
        }

        /* CTAエリア */
        .cta-area {
            padding-right: 25px;
            z-index: 2;
            text-align: center;
        }

        .cta-btn {
            background: #ea580c;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
            display: block;
            box-shadow: 0 4px 0 #9a3412;
            transition: all 0.2s;
        }

        .cta-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9a3412;
        }

        /* 背景の家のモチーフ（CSS描画） */
        .house-icon {
            position: absolute;
            right: 180px;
            bottom: -10px;
            width: 100px;
            height: 80px;
            background: #f3f4f6;
            clip-path: polygon(50% 0%, 0% 40%, 15% 40%, 15% 100%, 85% 100%, 85% 40%, 100% 40%);
            z-index: 1;
            opacity: 0.5;
        }

        /* アニメーションする「査定中」の吹き出し */
        .bubble {
            position: absolute;
            top: 10px;
            left: 150px;
            background: #fff;
            border: 1px solid #ea580c;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 10px;
            color: #ea580c;
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

    </style>
</head>
<body>

    <div class="ad-container" id="ad-container">
        <div class="house-icon"></div>
        <div class="bubble">10秒で算出！</div>

        <div class="logo-area">
            <p class="brand-name">家カチ<span>公式</span></p>
            <p class="brand-sub">架空AI不動産価格査定サービス</p>
        </div>

        <div class="main-content">
            <p class="catch-phrase">今の家、実は<strong>＋850万円</strong>かもしれません。</p>
            <div class="description">
                <span class="check-mark">✓</span> 匿名・無料 
                <span class="check-mark" style="margin-left:10px;">✓</span> 2026年最新相場対応
            </div>
        </div>

        <div class="cta-area">
            <div class="cta-btn">相場をチェック</div>
            <p style="font-size: 9px; color: #9ca3af; margin-top: 5px;">利用者数 XXX万人突破</p>
        </div>
    </div>
    <script src="popup.js"></script>

</body>
</html>
