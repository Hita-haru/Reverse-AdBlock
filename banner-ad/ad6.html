<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Guard Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #1e293b;
        }

        /* 広告枠の基本設定 */
        .ad-container {
            width: 728px;
            height: 90px;
            background: #0f172a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid #334155;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* 左側の警告インジケーター */
        .alert-bar {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: #facc15; /* 警告イエロー */
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ロゴセクション */
        .brand-section {
            padding-left: 25px;
            z-index: 2;
            min-width: 150px;
        }

        .brand-name {
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .brand-name span {
            color: #facc15;
            margin-right: 5px;
        }

        .brand-sub {
            color: #94a3b8;
            font-size: 9px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* メインコピー */
        .copy-section {
            flex-grow: 1;
            text-align: center;
            z-index: 2;
        }

        .main-copy {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }

        .main-copy span {
            color: #facc15;
        }

        .sub-copy {
            color: #cbd5e1;
            font-size: 12px;
            margin-top: 5px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* スマホ風アイコン */
        .phone-mock {
            position: absolute;
            right: 180px;
            bottom: -20px;
            width: 60px;
            height: 100px;
            background: #334155;
            border: 2px solid #64748b;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            z-index: 1;
            opacity: 0.4;
        }

        /* CTAボタン */
        .cta-section {
            padding-right: 25px;
            z-index: 2;
        }

        .cta-button {
            background: #fff;
            color: #0f172a;
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .cta-button:hover {
            transform: scale(1.05);
            background-color: #f1f5f9;
        }

        /* 波紋アニメーション（レーダー風） */
        .radar {
            position: absolute;
            right: 210px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            border: 1px solid rgba(250, 204, 21, 0.2);
            border-radius: 50%;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: translateY(-50%) scale(0.5); opacity: 0.8; }
            100% { transform: translateY(-50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ad-container" id="ad-container">
        <div class="alert-bar"></div>
        <div class="radar"></div>
        <div class="phone-mock"></div>

        <div class="brand-section">
            <p class="brand-name"><span>✚</span>Vital Guard</p>
            <p class="brand-sub">FICTION DISASTER PREVENTION</p>
        </div>

        <div class="copy-section">
            <p class="main-copy">その<span>1秒</span>が、運命を変える。</p>
            <div class="sub-copy">
                <span>● 地震速報</span>
                <span>● 豪雨予測</span>
                <span>● 避難所ナビ</span>
            </div>
        </div>

        <div class="cta-section">
            <div class="cta-button">
                無料インストール
            </div>
        </div>
    </div>
    <script src="popup.js"></script>

</body>
</html>
