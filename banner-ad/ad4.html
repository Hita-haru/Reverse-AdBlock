<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECLIPSE Automotive Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Optima', 'Didot', 'Hiragino Mincho ProN', serif;
            background-color: #000;
        }

        .ad-container {
            width: 728px;
            height: 90px;
            background: linear-gradient(90deg, #000 0%, #1a1a1a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid #222;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* 車のシルエットをイメージした抽象デザイン */
        .car-silhouette {
            position: absolute;
            left: 50px;
            width: 300px;
            height: 2px;
            background: linear-gradient(to right, transparent, #fff, transparent);
            box-shadow: 0 0 15px #fff;
            transform: rotate(-2deg);
            opacity: 0.7;
        }

        .car-light {
            position: absolute;
            left: 345px;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 20px #fff, 0 0 40px #007aff;
        }

        /* ロゴ */
        .brand-logo {
            padding-left: 40px;
            z-index: 2;
        }

        .brand-name {
            color: #fff;
            font-size: 24px;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* キャッチコピー */
        .copy-section {
            z-index: 2;
            text-align: right;
            padding-right: 30px;
            flex-grow: 1;
        }

        .main-copy {
            color: #fff;
            font-size: 20px;
            margin: 0;
            letter-spacing: 2px;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        .sub-copy {
            color: #888;
            font-size: 11px;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* CTAボタン */
        .cta-section {
            padding-right: 40px;
            z-index: 2;
        }

        .cta-button {
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 25px;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.4s;
            background: transparent;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            background: #fff;
            color: #000;
        }

        /* 流れるような光のアニメーション */
        .stream-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 122, 255, 0.4), transparent);
            animation: flow 3s infinite linear;
        }

        @keyframes flow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

    </style>
</head>
<body>

    <div class="ad-container" onclick="location.href='https://google.com'">
        <div class="stream-line" style="top: 20px; animation-delay: 0s;"></div>
        <div class="stream-line" style="top: 70px; animation-delay: 1.5s;"></div>
        
        <div class="car-silhouette" style="top: 45px;"></div>
        <div class="car-light" style="top: 41px;"></div>

        <div class="brand-logo">
            <h1 class="brand-name">ECLIPSE</h1>
        </div>

        <div class="copy-section">
            <p class="main-copy">静寂を、追い抜く。</p>
            <p class="sub-copy">The New All-Electric SUV / Model Zero</p>
        </div>

        <div class="cta-section">
            <div class="cta-button">試乗予約</div>
        </div>
    </div>

</body>
</html>
