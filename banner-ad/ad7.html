<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allegranon Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #e0f2fe;
        }

        /* 広告枠全体 */
        .ad-container {
            width: 728px;
            height: 90px;
            background: linear-gradient(to right, #ffffff, #7dd3fc);
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #bae6fd;
            box-sizing: border-box;
            cursor: pointer;
            overflow: hidden;
        }

        /* 花粉の粒子を模した装飾 */
        .pollen {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(2px);
            z-index: 1;
            animation: drift 10s infinite linear;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translate(-728px, 20px) rotate(360deg); opacity: 0.3; }
        }

        /* ロゴ部分 */
        .brand-area {
            width: 160px;
            padding-left: 20px;
            z-index: 2;
        }

        .brand-name {
            color: #0369a1;
            font-size: 20px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
        }

        .brand-sub {
            color: #0ea5e9;
            font-size: 9px;
            font-weight: bold;
            margin-top: 2px;
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 1px 4px;
        }

        /* キャッチコピー */
        .copy-area {
            flex-grow: 1;
            padding-left: 10px;
            z-index: 2;
        }

        .main-copy {
            color: #0c4a6e;
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }

        .main-copy span {
            color: #f43f5e; /* 目を引く強調色 */
            font-size: 24px;
        }

        .sub-copy {
            color: #0369a1;
            font-size: 13px;
            margin-top: 3px;
            font-weight: 500;
        }

        /* 特徴ラベル */
        .feature-labels {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .label {
            background: #fff;
            color: #0369a1;
            border: 1px solid #0369a1;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 2px;
        }

        /* CTAボタン */
        .cta-area {
            padding-right: 25px;
            z-index: 2;
        }

        .cta-btn {
            background: #0ea5e9;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
            transition: all 0.2s;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(14, 165, 233, 0.4);
        }

        /* 第2類医薬品タグ */
        .pharma-tag {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 9px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="ad-container" onclick="location.href='https://google,com'">
        <div class="pollen" style="width: 10px; height: 10px; right: -50px; top: 20px;"></div>
        <div class="pollen" style="width: 15px; height: 15px; right: -100px; top: 50px; animation-delay: 2s;"></div>
        <div class="pollen" style="width: 8px; height: 8px; right: -30px; top: 70px; animation-delay: 5s;"></div>

        <div class="pharma-tag">架空広告</div>

        <div class="brand-area">
            <p class="brand-name">アレグノン</p>
            <p class="brand-sub">Allegnon EX</p>
        </div>

        <div class="copy-area">
            <p class="main-copy"><span>1日1回</span>で、澄みわたる空へ。</p>
            <div class="feature-labels">
                <span class="label">眠くなりにくい</span>
                <span class="label">水なしOK</span>
                <span class="label">鼻水・目のかゆみに</span>
            </div>
        </div>

        <div class="cta-area">
            <div class="cta-btn">製品を詳しく見る</div>
        </div>
    </div>

</body>
</html>
